<!DOCTYPE html>
<html>
  <head>
    <title>Проект "Комменты"</title>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="styles.css" />
  </head>

  <body>
    <div class="container">
      <ul class="comments">
        <li class="comment">
          <div class="comment-header">
            <div>Глеб Фокин</div>
            <div>12.02.22 12:18</div>
          </div>
          <div class="comment-body">
            <div class="comment-text">
              Это будет первый комментарий на этой странице
            </div>
          </div>
          <div class="comment-footer">
            <div class="likes">
              <span class="likes-counter">3</span>
              <button class="like-button"></button>
            </div>
          </div>
        </li>
        <li class="comment">
          <div class="comment-header">
            <div>Варвара Н.</div>
            <div>13.02.22 19:22</div>
          </div>
          <div class="comment-body">
            <div class="comment-text">
              Мне нравится как оформлена эта страница! ❤
            </div>
          </div>
          <div class="comment-footer">
            <div class="likes">
              <span class="likes-counter">75</span>
              <button class="like-button -active-like"></button>
            </div>
          </div>
        </li>
      </ul>
      <div class="add-form">
        <input
          type="text"
          class="add-form-name"
          placeholder="Введите ваше имя"
        />
        <textarea
          type="textarea"
          class="add-form-text"
          placeholder="Введите ваш коментарий"
          rows="4"
        ></textarea>
        <div class="add-form-row">
          <button class="add-form-button">Написать</button>
        </div>
      </div>
    </div>
  </body>

  <script>
    "use strict";
    // Код писать здесь
    // Данные комментариев
    const commentsData = [
      {
        name: "Глеб Фокин",
        date: "12.02.22 12:18",
        text: "Это будет первый комментарий на этой странице",
        likes: 3,
        isLiked: false // состояние лайка от текущего пользователя
      },
      {
        name: "Варвара Н.",
        date: "13.02.22 19:22",
        text: "Мне нравится как оформлена эта страница! ❤",
        likes: 75,
        isLiked: true
      }
    ];

    const nameInput = document.querySelector(".add-form-name");
    const textInput = document.querySelector(".add-form-text");
    const addButton = document.querySelector(".add-form-button");
    const commentsList = document.querySelector(".comments");

    // Переменная для хранения данных ответа (чтобы отличать обычный комментарий от ответа)
    let replyTo = null;

    // Функция рендера всех комментариев
    function renderComments() {
      commentsList.innerHTML = ""; // очищаем список

      commentsData.forEach((comment, index) => {
        const likeClass = comment.isLiked ? "-active-like" : "";
        const newCommentHTML = `
          <li class="comment" data-index="${index}">
            <div class="comment-header">
              <div>${escapeHtml(comment.name)}</div>
              <div>${escapeHtml(comment.date)}</div>
            </div>
            <div class="comment-body">
              <div class="comment-text">
                ${escapeHtml(comment.text)}
              </div>
            </div>
            <div class="comment-footer">
              <div class="likes">
                <span class="likes-counter">${comment.likes}</span>
                <button class="like-button ${likeClass}"></button>
              </div>
            </div>
          </li>`;

        commentsList.insertAdjacentHTML("beforeend", newCommentHTML);
      });
    }

    // Простая защита от XSS при выводе пользовательского текста через replaceAll
    function escapeHtml(str) {
      if (!str) return "";
      return str
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    // Обработка кнопки «Написать»
    addButton.addEventListener("click", () => {
      const name = nameInput.value.trim();
      const text = textInput.value.trim();

      let errorMessage = "";

      if (!name && !text) {
        errorMessage = "Пожалуйста, заполните поля «Имя» и «Комментарий»";
      } else if (!name) {
        errorMessage = "Пожалуйста, заполните поле «Имя»";
      } else if (!text) {
        errorMessage = "Пожалуйста, заполните поле «Комментарий»";
      }

      if (errorMessage) {
        alert(errorMessage);
        return;
      }

      // Текущая дата и время
      const now = new Date();
      const day = String(now.getDate()).padStart(2, "0");
      const month = String(now.getMonth() + 1).padStart(2, "0");
      const year = now.getFullYear();
      const hours = String(now.getHours()).padStart(2, "0");
      const minutes = String(now.getMinutes()).padStart(2, "0");

      const dateTimeString = `${day}.${month}.${year} ${hours}:${minutes}`;

      // Добавляем новый комментарий в массив данных
      commentsData.push({
        name,
        date: dateTimeString,
        text,
        likes: 0,
        isLiked: false
      });

      // Сбрасываем состояние ответа после отправки
      replyTo = null;

      // Перерисовываем все комментарии
      renderComments();

      // Очистка полей
      nameInput.value = "";
      textInput.value = "";
    });

    // Обработка кликов по списку комментариев (лайки и ответы)
    commentsList.addEventListener("click", (event) => {
      // Ответ не подставляется при клике на лайк
      const likeButton = event.target.closest(".like-button");
      if (likeButton) {
        // Обрабатываем только лайк, дальше не идём
        handleLikeClick(likeButton);
        return; // предотвращаем обработку как ответа
      }

      // Если клик был не по лайку, обрабатываем как клик по комментарию для ответа
      const commentElement = event.target.closest(".comment");
      if (commentElement) {
        handleReplyClick(commentElement);
      }
    });

    // Отдельная функция для обработки лайка
    function handleLikeClick(button) {
      const commentElement = button.closest(".comment");
      const index = Number(commentElement.getAttribute("data-index"));

      if (isNaN(index) || index < 0 || index >= commentsData.length) return;

      const comment = commentsData[index];
      if (comment.isLiked) {
        comment.likes--;
        comment.isLiked = false;
      } else {
        comment.likes++;
        comment.isLiked = true;
      }

      renderComments();
    }

    // Логика ответа на комментарий
    function handleReplyClick(commentElement) {
      const index = Number(commentElement.getAttribute("data-index"));
      if (isNaN(index) || index < 0 || index >= commentsData.length) return;

      const comment = commentsData[index];

      // Подставляем имя и текст в форму
      nameInput.value = comment.name;
      // Формируем цитату с символом >
      textInput.value = `> ${escapeHtml(comment.text)}\n`;

      // Сохраняем контекст
      replyTo = index;
    }

    // Первоначальная отрисовка
    renderComments();
    console.log("It works!");
  </script>
</html>

<!DOCTYPE html>
<html>
  <head>
    <title>Проект "Комменты"</title>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="styles.css" />
  </head>

  <body>
    <div class="container">
      <ul class="comments">
        <li class="comment">
          <div class="comment-header">
            <div>Глеб Фокин</div>
            <div>12.02.22 12:18</div>
          </div>
          <div class="comment-body">
            <div class="comment-text">
              Это будет первый комментарий на этой странице
            </div>
          </div>
          <div class="comment-footer">
            <div class="likes">
              <span class="likes-counter">3</span>
              <button class="like-button"></button>
            </div>
          </div>
        </li>
        <li class="comment">
          <div class="comment-header">
            <div>Варвара Н.</div>
            <div>13.02.22 19:22</div>
          </div>
          <div class="comment-body">
            <div class="comment-text">
              Мне нравится как оформлена эта страница! ❤
            </div>
          </div>
          <div class="comment-footer">
            <div class="likes">
              <span class="likes-counter">75</span>
              <button class="like-button -active-like"></button>
            </div>
          </div>
        </li>
      </ul>
      <div class="add-form">
        <input
          type="text"
          class="add-form-name"
          placeholder="Введите ваше имя"
        />
        <textarea
          type="textarea"
          class="add-form-text"
          placeholder="Введите ваш коментарий"
          rows="4"
        ></textarea>
        <div class="add-form-row">
          <button class="add-form-button">Написать</button>
        </div>
      </div>
    </div>
  </body>

  <script>
    "use strict";
    // Код писать здесь
      const nameInput = document.querySelector(".add-form-name");
      const textInput = document.querySelector(".add-form-text");
      const addButton = document.querySelector(".add-form-button");
      const commentsList = document.querySelector(".comments");

      // Обработка кнопки «Написать»
      addButton.addEventListener("click", () => {
        const name = nameInput.value.trim();
        const text = textInput.value.trim();

        let errorMessage = "";

        if (!name && !text) {
          errorMessage = "Пожалуйста, заполните поля «Имя» и «Комментарий»";
        } else if (!name) {
          errorMessage = "Пожалуйста, заполните поле «Имя»";
        } else if (!text) {
          errorMessage = "Пожалуйста, заполните поле «Комментарий»";
        }

        // Если есть ошибка — показываем и прерываем выполнение
        if (errorMessage) {
          alert(errorMessage);
          return;
        }

        // Текущая дату и время
        const now = new Date();
        const day = String(now.getDate()).padStart(2, "0");
        const month = String(now.getMonth() + 1).padStart(2, "0");
        const year = now.getFullYear();
        const hours = String(now.getHours()).padStart(2, "0");
        const minutes = String(now.getMinutes()).padStart(2, "0");

        const dateTimeString = `${day}.${month}.${year} ${hours}:${minutes}`;

        // Шаблон новго комментария
        const newCommentHTML = `
          <li class="comment">
            <div class="comment-header">
              <div>${name}</div>
              <div>${dateTimeString}</div>
            </div>
            <div class="comment-body">
              <div class="comment-text">
                ${text}
              </div>
            </div>
            <div class="comment-footer">
              <div class="likes">
                <span class="likes-counter">0</span>
                <button class="like-button"></button>
              </div>
            </div>
          </li>`;

        // Новый комментарий в конец списка
        commentsList.innerHTML += newCommentHTML;

        // Очистка полей после добавления комментария
        nameInput.value = "";
        textInput.value = "";
      });

      // Делегирование события для лайков
      commentsList.addEventListener("click", (event) => {
        const button = event.target.closest(".like-button");
        if (!button) return;

        const counter = button.parentElement.querySelector(".likes-counter");
        let currentLikes = parseInt(counter.textContent, 10) || 0;

        // Переключаем состояние
        if (button.classList.contains("-active-like")) {
          // Убираем лайк
          button.classList.remove("-active-like");
          currentLikes--;
        } else {
          // Ставим лайк
          button.classList.add("-active-like");
          currentLikes++;
        }

        counter.textContent = currentLikes;
      });
    console.log("It works!");
  </script>
</html>
